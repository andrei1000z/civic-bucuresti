name: Fetch Știri RSS

on:
  schedule:
    # La fiecare oră, la minutul 10
    - cron: '10 * * * *'
  workflow_dispatch: # permite rulare manuală din GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger stiri fetch
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://www.civia.ro/api/stiri/fetch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Fetch returned HTTP $response"
          fi
